<!doctype html>
<html lang="en" class="p-0 text-xl text-gray-200 bg-bg">
  <head>
    <title>{{ with .Title }}{{ . }} – {{ end }}{{ .Site.Title }}</title>
    {{ hugo.Generator }}
    {{ partial "seo.html" . }}
    <link rel="icon" href="/favicon.ico" />
    {{ with (templates.Defer (dict "key" "global")) }} {{ partial "css.html" . }} {{ end }}
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="alternate"
      type="application/atom+xml"
      title="{{ .Site.Title }}"
      href="/feed.xml"
    />
  </head>
  <body>
    {{ partial "nav.html" . }} {{ if .Params.fullWidth }} {{ block "main" . }}{{ end }} {{ else }}
    <div class="py-10 px-6 mx-auto max-w-2xl text-left">
      {{ block "main" . }}{{ end }}
    </div>
    {{ end }}
  </body>
</html>
