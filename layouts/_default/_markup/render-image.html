{{- $src := .Destination -}}
{{- $alt := .PlainText -}}
{{- $path := strings.TrimPrefix "/assets/" $src -}}
{{- $img := resources.Get $path -}}
{{- if $img -}}
  {{ partial "picture.html" (dict "src" $path "alt" $alt) }}
{{- else -}}
  <img src="{{ $src | safeURL }}"{{- with $alt }} alt="{{ . }}"{{ end -}}>
{{- end -}}
