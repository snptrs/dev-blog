{{ $pages := . }}
{{ range $index, $post := $pages }}
<article>
    <a href="{{ $post.RelPermalink }}" class="flex gap-6 items-center py-5 group">
        {{ partial "post-date.html" $post.Date }}
        <h2 class="min-w-0 text-lg font-bold group-hover:text-gray-400 grow truncate">
            {{ $post.Title }}
        </h2>
    </a>
</article>
{{ if ne $index (sub (len $pages) 1) }}
<hr class="border-gray-700" />
{{ end }}
{{ end }}
